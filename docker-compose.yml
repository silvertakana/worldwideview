services:
  wwv:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - wwv-data:/app/data
    env_file:
      - path: .env
        required: false
    environment:
      - "AUTH_SECRET=${AUTH_SECRET:-default_secret_for_local_dev}"
      - "WWV_DEMO_ADMIN_SECRET=${WWV_DEMO_ADMIN_SECRET:-}"
      - "WWV_BRIDGE_TOKEN=${WWV_BRIDGE_TOKEN:-}"

volumes:
  wwv-data:

networks:
  coolify:
    external: true
